<h2>Login</h2>
<form (ngSubmit)="onSubmit()">
    <input
        [value]="email()"
        (input)="email.set($any($event.target).value)"
        placeholder="Email"
    />
    <input
        [value]="password()"
        (input)="password.set($any($event.target).value)"
        placeholder="Password"
        type="password"
    />
    <button type="submit">Login</button>
</form>
