<div class="container mt-4">
    @if (recipeDetail() !== null) {
        <div class="card shadow-sm h-100">
            <div class="card-body position-relative">
                <h3 class="card-title">{{ recipeDetail().title }}</h3>
                <p class="card-text">Autor: {{ recipeDetail().author.email }}</p>

                <hr>

                <p>Ingredientes ...</p>

                <button class="btn btn-secondary" (click)="backToRecipes()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
            </div>
        </div>
    }
</div>
