<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4"><i class="fa-solid fa-burger"></i> Crear Receta</h2>

        <div class="mt-2 justify-content-center d-flex flex-row gap-3">
            <button class="btn btn-primary" (click)="selectedMode('manual')"><i class="fa-solid fa-egg"></i> Manualmente</button>
            <button class="btn btn-primary" (click)="selectedMode('ia')"><i class="fa-solid fa-robot"></i> Con Ingredientes de la Nevera</button>
        </div>

        @switch (mode()) {
            @case ('manual') {
                <div class="mb-3">
                    <p class="fs-3">Título</p>
                    <input
                        class="form-control"
                        [value]="title()"
                        (input)="title.set($any($event.target).value)"
                        placeholder="Título de la receta"
                    />
                </div>
                <div class="mb-3">
                    <p class="fs-3">Ingredientes</p>
                    <div class="accordion" id="accordionIngredients">
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
                                    Ver mi nevera
                                </button>
                            </h2>
                            <div id="collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionIngredients">
                                <div class="accordion-body">
                                    Proximamente...
                                </div>
                            </div>
                        </div>
                        <div class="accordion-item">
                            <h2 class="accordion-header">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                                    Agregar Ingrediente
                                </button>
                            </h2>
                            <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionIngredients">
                                <div class="accordion-body">
                                    <div class="d-flex flex-row gap-3">
                                        <input
                                            [value]="quantityInput()"
                                            class="form-control"
                                            placeholder="Cantidad"
                                            (input)="quantityInput.set($any($event.target).value)"
                                        />
                                        <input
                                            [value]="ingredientInput()"
                                            class="form-control"
                                            placeholder="Ingrediente"
                                            (input)="ingredientInput.set($any($event.target).value)"
                                        />
                                    </div>
                                    <div class="d-flex justify-content-end mt-3">
                                        <button class="btn btn-success" (click)="onAddIngredient()"><i class="fa-solid fa-plus"></i> Add</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <hr>
                    <div class="mt-3 d-inline-flex flex-column">
                        <ul class="list-group list-group-flush">
                            @for (ingredient of ingredientsList(); track ingredient.ingredient) {
                                <li class="list-group-item">
                                    <div class="d-flex justify-content-between align-items-center gap-3">
                                        <p class="mb-0 fst-italic"> <strong>{{ ingredient.ingredient }}</strong>: {{ ingredient.quantity }} </p>
                                        <button class="btn btn-sm btn-outline-danger" (click)="deleteIngredient(ingredient.ingredient)"><i class="fa-solid fa-trash-can"></i></button>
                                    </div>
                                </li>
                            }
                        </ul>
                    </div>
                </div>
                <div class="mb-3">
                    <p class="fs-3">Procedimiento</p>
                    <div class="form-floating">
                        <textarea class="form-control" id="floatingTextarea2" style="height: 100px" [value]="process()" (input)="process.set($any($event.target).value)"></textarea>
                    </div>
                </div>
            }
            @case ('ia') {
                <div class="mb-3">
                    <label class="form-label">In Progress...</label>
                </div>
            }
        }

        <div class="d-flex justify-content-end">
            <button class="btn btn-danger me-2" (click)="goToRecipes()"><i class="fa-regular fa-circle-xmark"></i> Cancelar</button>
            <button class="btn btn-success" (click)="createRecipe()"><i class="fa-solid fa-bookmark"></i> Guardar Receta</button>
        </div>
    </div>

</div>
