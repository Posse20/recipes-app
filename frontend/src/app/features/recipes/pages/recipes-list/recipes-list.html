<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fa-solid fa-utensils"></i> Recetas</h2>
        <button class="btn btn-primary" (click)="goToCreateRecipe()"><i class="fa-solid fa-plus"></i> Agregar Receta</button>
    </div>

    <div class="row">
        @for(recipe of recipes(); track recipe.title){
            <div class="col-md-4 mb-3">
                    <div class="card shadow-sm h-100">
                        <div class="card-body">
                            <h3 class="card-title">{{ recipe.title }}</h3>
                            <p class="card-text">Autor: {{ recipe.author.email }}</p>
                        </div>
                    </div>
            </div>
        }
    </div>
</div>


<hr/>
