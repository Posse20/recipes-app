<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fa-solid fa-utensils"></i> Recetas</h2>
        <button class="btn btn-secondary" (click)="goToCreateRecipe()"><i class="fa-solid fa-plus"></i> Agregar Receta</button>
    </div>

    <div class="row">
        @for(recipe of recipes(); track recipe.title){
            <div class="col-md-4 mb-3">
                    <div class="card shadow-sm h-100">
                        <div class="card-body position-relative">
                            <h3 class="card-title">{{ recipe.title }}</h3>
                            <p class="card-text">Autor: {{ recipe.author.email }}</p>
                            <button class="btn btn-danger position-absolute bottom-0 end-0 m-2" (click)="deleteRecipe(recipe.id)"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
            </div>
        }
        @if (deletedSuccessAlert()) {
            <div class="alert alert-success" role="alert">
                La receta se eliminó correctamente!
            </div>
        }
    </div>
</div>


<hr/>
